---
- name: Escalar workloads en GitOps
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validar parametros de entrada
      ansible.builtin.include_role:
        name: gitops_common_validate
      vars:
        gitops_validate_required_vars:
          - repo_url
          - gitops_scaled_workloads

    - name: Orquestar escalado de workloads
      block:
        - name: Preparar workspace GitOps
          ansible.builtin.include_role:
            name: gitops_workspace
          vars:
            gitops_repo_url: "{{ repo_url }}"
            gitops_branch: "{{ git_branch | default('main') }}"
            gitops_workspace_base: "{{ workspace_base | default('/tmp') }}"
            gitops_workspace_name: scale-workload
            gitops_root_dirs:
              - "{{ repo_path | default('clusters/prod/overlays/scaling') }}"
              - "{{ (repo_path | default('clusters/prod/overlays/scaling')) ~ '/patches' }}"

        - name: Renderizar parches de escalado
          ansible.builtin.include_role:
            name: gitops_workload_scale_render

        - name: Confirmar cambios en Git
          ansible.builtin.include_role:
            name: gitops_git_push
          vars:
            gitops_repo_checkout_dir: "{{ gitops_repo_checkout_dir }}"
            gitops_git_add_paths:
              - "{{ repo_path | default('clusters/prod/overlays/scaling') }}"
            gitops_commit_message: "{{ git_commit_message | default('Actualizar escalado de workloads') }}"
            gitops_branch: "{{ git_branch | default('main') }}"
      always:
        - name: Limpiar workspace temporal
          ansible.builtin.include_role:
            name: gitops_cleanup
          vars:
            gitops_workspace_dir: "{{ gitops_workspace_dir }}"
          when: gitops_workspace_dir is defined
