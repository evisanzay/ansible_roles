---
- name: Validar parametros obligatorios
  ansible.builtin.assert:
    that:
      - gitops_repo_checkout_dir is defined
      - namespace_name is defined
      - >
        (
          (gitops_rbac_group_bindings is defined)
          and
          (gitops_rbac_group_bindings | length > 0)
        )
        or
        (
          (admin_group is defined)
          and
          (reader_group is defined)
        )
    fail_msg: "Faltan parametros obligatorios: gitops_repo_checkout_dir, namespace_name y RBAC de grupos (gitops_rbac_group_bindings o admin_group/reader_group)"

- name: Validar nombre del namespace
  ansible.builtin.assert:
    that:
      - namespace_name is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
    fail_msg: "El namespace no cumple el formato permitido por Kubernetes"

- name: Crear directorios del namespace
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ gitops_namespace_render_root_dir }}"
    - "{{ gitops_namespace_render_rbac_dir }}"
    - "{{ gitops_namespace_render_serviceaccounts_dir }}"

- name: Usar bindings de grupos explicitos
  ansible.builtin.set_fact:
    gitops_namespace_render_group_bindings: "{{ gitops_rbac_group_bindings }}"
  when: gitops_rbac_group_bindings is defined

- name: Normalizar bindings de grupos heredados
  ansible.builtin.set_fact:
    gitops_namespace_render_group_bindings:
      - name: "{{ namespace_name }}-admin-group"
        namespace: "{{ namespace_name }}"
        role_ref_kind: ClusterRole
        role_ref_name: admin
        subjects:
          - name: "{{ admin_group }}"
      - name: "{{ namespace_name }}-reader-group"
        namespace: "{{ namespace_name }}"
        role_ref_kind: ClusterRole
        role_ref_name: view
        subjects:
          - name: "{{ reader_group }}"
  when: gitops_rbac_group_bindings is not defined

- name: Normalizar serviceaccounts
  ansible.builtin.set_fact:
    gitops_namespace_render_serviceaccounts: "{{ gitops_rbac_serviceaccounts | default(gitops_namespace_render_legacy_serviceaccounts) }}"
  vars:
    gitops_namespace_render_legacy_serviceaccounts: >-
      {{
        (ns_service_accounts | default(default_service_accounts))
        | map('combine', {'namespace': namespace_name, 'create': true})
        | list
      }}

- name: Normalizar bindings de serviceaccounts
  ansible.builtin.set_fact:
    gitops_namespace_render_serviceaccount_bindings: "{{ gitops_rbac_serviceaccount_bindings | default(gitops_namespace_render_legacy_serviceaccount_bindings) }}"
  vars:
    gitops_namespace_render_legacy_serviceaccount_bindings: >-
      {%- set bindings = [] -%}
      {%- for sa in (ns_service_accounts | default(default_service_accounts)) -%}
      {%- set _ = bindings.append({
            'name': namespace_name ~ '-sa-' ~ sa.name ~ '-binding',
            'namespace': namespace_name,
            'role_ref_kind': 'ClusterRole',
            'role_ref_name': sa.cluster_role,
            'subjects': [
              {
                'name': sa.name,
                'namespace': namespace_name
              }
            ]
          }) -%}
      {%- endfor -%}
      {{ bindings }}

- name: Construir lista dinamica de serviceaccounts renderizadas
  ansible.builtin.set_fact:
    gitops_namespace_render_dynamic_sa_resources: >-
      {{
        gitops_namespace_render_serviceaccounts
        | rejectattr('create', 'defined')
        | map(attribute='name')
        | map('regex_replace', '^(.*)$', 'serviceaccounts/\\1.yaml')
        | list
        +
        (
          gitops_namespace_render_serviceaccounts
          | selectattr('create', 'defined')
          | selectattr('create')
          | map(attribute='name')
          | map('regex_replace', '^(.*)$', 'serviceaccounts/\\1.yaml')
          | list
        )
      }}

- name: Definir recursos base de Kustomize
  ansible.builtin.set_fact:
    kustomize_resources: >-
      {{
        ['namespace.yaml', 'quota.yaml', 'limitrange.yaml']
        + (['rbac/groups.yaml'] if gitops_namespace_render_group_bindings | length > 0 else [])
        + (['rbac/serviceaccounts-bindings.yaml'] if gitops_namespace_render_serviceaccount_bindings | length > 0 else [])
        + gitops_namespace_render_dynamic_sa_resources
      }}

- name: Crear kustomization padre si no existe
  ansible.builtin.copy:
    dest: "{{ gitops_namespace_render_parent_kustomization_file }}"
    mode: "0644"
    force: false
    content: |
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization

      resources:

- name: Renderizar recursos base del namespace
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ gitops_namespace_render_root_dir }}/{{ item.dest }}"
    mode: "0644"
  loop:
    - src: kustomization.yaml.j2
      dest: kustomization.yaml
    - src: namespace.yaml.j2
      dest: namespace.yaml
    - src: quota.yaml.j2
      dest: quota.yaml
    - src: limitrange.yaml.j2
      dest: limitrange.yaml

- name: Renderizar RBAC y serviceaccounts
  ansible.builtin.include_role:
    name: gitops_rbac_render
  vars:
    gitops_rbac_namespace: "{{ namespace_name }}"
    gitops_rbac_rbac_dir: "{{ gitops_namespace_render_rbac_dir }}"
    gitops_rbac_serviceaccounts_dir: "{{ gitops_namespace_render_serviceaccounts_dir }}"
    gitops_rbac_group_bindings: "{{ gitops_namespace_render_group_bindings }}"
    gitops_rbac_serviceaccounts: "{{ gitops_namespace_render_serviceaccounts }}"
    gitops_rbac_serviceaccount_bindings: "{{ gitops_namespace_render_serviceaccount_bindings }}"

- name: Anadir namespace al kustomization padre
  ansible.builtin.lineinfile:
    path: "{{ gitops_namespace_render_parent_kustomization_file }}"
    line: "  - {{ namespace_name }}"
    insertafter: "^resources:"
    regexp: "^\\s+-\\s+{{ namespace_name }}$"
    state: present
