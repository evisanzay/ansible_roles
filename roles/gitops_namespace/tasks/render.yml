---
- name: Renderizar kustomization.yaml
  ansible.builtin.template:
    src: kustomization.yaml.j2
    dest: "{{ namespace_root_dir }}/kustomization.yaml"
    mode: "0644"

- name: Renderizar namespace.yaml
  ansible.builtin.template:
    src: namespace.yaml.j2
    dest: "{{ namespace_root_dir }}/namespace.yaml"
    mode: "0644"

- name: Renderizar quota.yaml
  ansible.builtin.template:
    src: quota.yaml.j2
    dest: "{{ namespace_root_dir }}/quota.yaml"
    mode: "0644"

- name: Renderizar limitrange.yaml
  ansible.builtin.template:
    src: limitrange.yaml.j2
    dest: "{{ namespace_root_dir }}/limitrange.yaml"
    mode: "0644"

- name: Renderizar RBAC y serviceaccounts
  ansible.builtin.include_role:
    name: gitops_rbac_render
  vars:
    gitops_rbac_namespace: "{{ namespace_name }}"
    gitops_rbac_rbac_dir: "{{ namespace_rbac_dir }}"
    gitops_rbac_serviceaccounts_dir: "{{ namespace_sa_dir }}"
    gitops_rbac_group_bindings: "{{ namespace_rbac_group_bindings }}"
    gitops_rbac_serviceaccounts: "{{ namespace_rbac_serviceaccounts }}"
    gitops_rbac_serviceaccount_bindings: "{{ namespace_rbac_serviceaccount_bindings }}"

- name: Renderizar networkpolicy default deny
  ansible.builtin.template:
    src: networkpolicy-default-deny.yaml.j2
    dest: "{{ namespace_np_dir }}/default-deny.yaml"
    mode: "0644"
  when: network_policies.default_deny | bool

- name: Renderizar networkpolicy allow dns
  ansible.builtin.template:
    src: networkpolicy-allow-dns.yaml.j2
    dest: "{{ namespace_np_dir }}/allow-dns.yaml"
    mode: "0644"
  when: network_policies.allow_dns | bool

- name: Renderizar networkpolicy allow ingress controller
  ansible.builtin.template:
    src: networkpolicy-allow-ingress-controller.yaml.j2
    dest: "{{ namespace_np_dir }}/allow-ingress-controller.yaml"
    mode: "0644"
  when: network_policies.allow_ingress_controller | bool

- name: Añadir namespace al kustomization padre
  ansible.builtin.lineinfile:
    path: "{{ repo_checkout_dir }}/{{ repo_path }}/kustomization.yaml"
    line: "  - {{ namespace_name }}"
    insertafter: "^resources:"
    regexp: "^\\s+-\\s+{{ namespace_name }}$"
    state: present
